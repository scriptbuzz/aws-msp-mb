  <text x="70" y="443" font-size="9" fill="#5a6472">Release = new commit bumping app/VERSION (ECR tags immutable: &lt;version&gt;-&lt;commit&gt;) · V2 trigger on app/* · buildspecs + app source live in the GitHub repo, not the port zip</text>
  <text x="70" y="459" font-size="9" fill="#5a6472">3 CodeBuild projects: cb-build (MEDIUM, docker) · cb-deploy-env (SMALL, reused per env) · cb-change-record (SMALL)</text>
  <text x="70" y="476" font-size="9" font-weight="600" fill="#9a3412">Artifacts: SourceArtifact → BuildArtifact (imageDetail.json digest pointer + taskdef.json + appspec.yaml) → ChangeRecordArtifact · stored in the S3 artifact bucket</text>
